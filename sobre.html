<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario Basico</h1>
    

    <p>Bem vindo a minha aplicação!</p>

    <a href="index.html" target="_blank">pagina inicial do meu curriculo</a> <br> <br>

    <form>
        <label for ="nome">Nome:</label> <br>
        <input type="text" name="nome" id="nome" required placeholder="Digite seu nome"> <br> <br>

        <label for="sobrenome">Sobrenome:</label> <br>
        <input type="text" name="sobrenome" id="sobrenome" required placeholder="Digite seu sobrenome"> <br> <br>

        <label for="email">E-mail:</label> <br>
        <input type="email" name="email" id="email" required placeholder="Digite seu E-mail"> <br> <br>

        <label for="cpf">CPF:</label> <br>
        <input type="text" name="cpf" id="cpf" required placeholder="Digite seu CPF" maxlength="11"> <br> <br>

        <label for="telefone">Telefone:</label> <br>
        <input type="tel" name="telefone" id="telefone" required placeholder="Digite seu numero" maxlength="11"> <br> <br>

        <label for="foto">Foto</label><br>
        <input type="file" name="foto" id="foto" required ><br><br><br>

        <button type="submit"> Enviar</button>
        
    </form>

</body>
</html>
