<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        label{
            font-size: 16px;
            color:red;
        }

        input{
            font-size: 16px;
            color:blue;
        }
    </style>
</head>
<body>

    
    <div>
        <h1>Formulário Básico</h1>
        <p>Bem-vindo à minha aplicação!</p>
        <a href="index.html" target="_blank">Página inicial do meu currículo</a>
    </div>

    <hr>

    
    <form action="" method="POST" enctype="multipart/form-data">

        <!-- Campo Nome -->
        <div>
            <label for="nome">Nome:</label><br>
            <input type="text" name="nome" id="nome" required placeholder="Digite seu nome">
        </div><br>

        <!-- Campo Sobrenome -->
        <div>
            <label for="sobrenome">Sobrenome:</label><br>
            <input type="text" name="sobrenome" id="sobrenome" required placeholder="Digite seu sobrenome">
        </div><br>

        <!-- Campo E-mail -->
        <div>
            <label for="email">E-mail:</label><br>
            <input type="email" name="email" id="email" required placeholder="Digite seu E-mail">
        </div><br>

        <!-- Campo CPF -->
        <div>
            <label for="cpf">CPF:</label><br>
            <input type="text" name="cpf" id="cpf" required placeholder="Digite seu CPF" maxlength="11">
        </div><br>

        <!-- Campo Telefone -->
        <div>
            <label for="telefone">Telefone:</label><br>
            <input type="tel" name="telefone" id="telefone" required placeholder="Digite seu número" maxlength="11">
        </div><br>

        <!-- Campo Foto -->
        <div>
            <label for="foto">Foto:</label><br>
            <input type="file" name="foto" id="foto" required>
        </div><br>

        <!-- Botão de Envio -->
        <div>
            <button type="submit">Enviar</button>
        </div>

    </form>

</body>
</html>
